services:
  - type: web
    name: israelle
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: SUPABASE_URL
        sync: false   # set in Render dashboard
      - key: SUPABASE_KEY
        sync: false   # set in Render dashboard (publishable key)
