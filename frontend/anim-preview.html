<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>IsraelE — Path Animation Preview</title>
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<style>
  :root { --bg: #0a1424; --panel: #11203a; --line: #1f3354; --fg: #eaf2ff; --muted: #8ea4c8; --accent: #4d7df0; --good: #34d399; }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: system-ui, -apple-system, "Segoe UI", sans-serif; background: var(--bg); color: var(--fg); display: grid; grid-template-columns: 320px 1fr; height: 100vh; overflow: hidden; }
  #panel { background: var(--panel); border-right: 1px solid var(--line); padding: 16px; overflow-y: auto; }
  #panel h1 { font-size: 16px; margin: 0 0 4px; }
  #panel p.sub { font-size: 12px; color: var(--muted); margin: 0 0 16px; }
  .section { margin-bottom: 18px; }
  .section h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin: 0 0 8px; }
  .variant { display: block; padding: 10px 12px; border: 1px solid var(--line); border-radius: 8px; margin-bottom: 6px; cursor: pointer; transition: background 120ms, border-color 120ms; font-size: 13px; }
  .variant:hover { background: #182c4d; }
  .variant.active { border-color: var(--accent); background: #1a2e54; box-shadow: 0 0 0 1px var(--accent) inset; }
  .variant .name { font-weight: 600; }
  .variant .desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .preset { display: inline-block; padding: 6px 10px; margin: 0 4px 6px 0; border: 1px solid var(--line); border-radius: 6px; cursor: pointer; font-size: 12px; background: transparent; color: var(--fg); }
  .preset:hover { background: #182c4d; }
  .preset.active { border-color: var(--accent); }
  button.play { width: 100%; padding: 12px; background: var(--accent); border: none; color: white; font-weight: 600; border-radius: 8px; cursor: pointer; font-size: 14px; }
  button.play:hover { background: #5a8bff; }
  button.play:disabled { opacity: 0.5; cursor: wait; }
  label.row { display: flex; align-items: center; justify-content: space-between; font-size: 12px; margin: 8px 0; color: var(--muted); }
  input[type=range] { width: 140px; }
  #map { width: 100%; height: 100%; }
  .stat { font-size: 12px; color: var(--muted); margin: 4px 0; }
  .stat strong { color: var(--fg); }

  /* marker styles — use absolute + negative margin (NOT transform) to center
     inside maplibre's zero-size wrap, matching the main app. */
  .marker-wrap { position: relative; width: 0; height: 0; pointer-events: none; }
  .comet-head {
    position: absolute; left: 0; top: 0;
    width: 18px; height: 18px; margin-left: -9px; margin-top: -9px;
    border-radius: 50%;
    background: radial-gradient(circle, #ffffff 0%, #cfe0ff 40%, #4d7df0 80%, rgba(77,125,240,0) 100%);
    box-shadow: 0 0 22px 6px rgba(77,125,240,0.85), 0 0 40px 10px rgba(255,255,255,0.35);
  }
  .ripple-ring {
    position: absolute; left: 0; top: 0;
    width: 22px; height: 22px; margin-left: -11px; margin-top: -11px;
    border: 2px solid #4d7df0; border-radius: 50%;
  }
  .guess-dot, .truth-dot {
    position: absolute; left: 0; top: 0;
    width: 18px; height: 18px; margin-left: -9px; margin-top: -9px;
    border-radius: 50%; border: 2px solid #fff;
    box-shadow: 0 0 12px rgba(0,0,0,0.6);
  }
  .guess-dot { background: #f0a44d; }
  .truth-dot { background: #34d399; }

  .spark {
    position: absolute; left: 0; top: 0;
    width: 6px; height: 6px; margin-left: -3px; margin-top: -3px;
    border-radius: 50%; background: #fff; box-shadow: 0 0 8px 2px #cfe0ff;
  }
  .dust {
    position: absolute; left: 0; top: 0;
    width: 8px; height: 8px; margin-left: -4px; margin-top: -4px;
    border-radius: 50%; background: radial-gradient(circle, #f3d27a 0%, rgba(243,210,122,0) 70%);
  }
  .seed {
    position: absolute; left: 0; top: 0;
    width: 7px; height: 9px; margin-left: -3px; margin-top: -4px;
    border-radius: 60% 60% 50% 50% / 70% 70% 30% 30%;
    background: radial-gradient(circle at 40% 30%, #ff6b6b 0%, #c0392b 60%, #6e1313 100%);
    box-shadow: 0 0 4px rgba(192,57,43,0.6);
  }
  .magen {
    position: absolute; left: 0; top: 0;
    width: 60px; height: 60px; margin-left: -30px; margin-top: -30px;
    pointer-events: none;
  }
</style>
</head>
<body>
<aside id="panel">
  <h1>Path animation preview</h1>
  <p class="sub">Guess (orange) → truth (green). Pick a variant, hit play.</p>

  <div class="section">
    <h2>Variant</h2>
    <div id="variants"></div>
  </div>

  <div class="section">
    <h2>Test case</h2>
    <button class="preset active" data-preset="0">Tel Aviv → Jerusalem (close)</button>
    <button class="preset" data-preset="1">Eilat → Metula (long)</button>
    <button class="preset" data-preset="2">Haifa → Beer Sheva (mid)</button>
    <button class="preset" data-preset="3">Tiny offset (10 km)</button>
  </div>

  <div class="section">
    <h2>Tuning</h2>
    <label class="row">Duration <input id="duration" type="range" min="800" max="5000" step="100" value="2400" /><span id="durVal">2400ms</span></label>
    <label class="row">Arc height <input id="arcK" type="range" min="0" max="0.5" step="0.02" value="0.18" /><span id="arcKVal">0.18</span></label>
  </div>

  <button class="play" id="play">▶ Play animation</button>

  <div class="section" style="margin-top: 18px;">
    <h2>Stats</h2>
    <div class="stat">Distance: <strong id="dist">—</strong></div>
    <div class="stat">Variant: <strong id="varName">—</strong></div>
  </div>
</aside>

<div id="map"></div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="https://cdn.jsdelivr.net/npm/animejs@4/dist/bundles/anime.umd.min.js"></script>
<script>
// ─── Setup ──────────────────────────────────────────────────────────────────
const SAT_STYLE = {
  version: 8,
  sources: { esri_sat: { type: "raster",
    tiles: ["https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}"],
    tileSize: 256, maxzoom: 19,
    attribution: "Tiles © Esri",
  }},
  layers: [{ id: "esri_sat", type: "raster", source: "esri_sat" }],
};

const PRESETS = [
  { name: "TLV→JLM",   from: [34.7818, 32.0853], to: [35.2137, 31.7683] },
  { name: "Eilat→Metula", from: [34.9482, 29.5577], to: [35.5775, 33.2776] },
  { name: "Haifa→BeerSheva", from: [34.9896, 32.7940], to: [34.7913, 31.2518] },
  { name: "tiny",       from: [34.7818, 32.0853], to: [34.8500, 32.1300] },
];

const map = new maplibregl.Map({
  container: "map", style: SAT_STYLE,
  center: [35.0, 31.5], zoom: 7, attributionControl: false,
});

let guessMarker, truthMarker, cometMarker;
let activePreset = 0;
let activeVariant = "magen-hatikvah";
let playing = false;

// ─── Helpers ────────────────────────────────────────────────────────────────
function haversine(a, b) {
  const R = 6371;
  const toRad = d => d * Math.PI / 180;
  const dLat = toRad(b[1] - a[1]);
  const dLng = toRad(b[0] - a[0]);
  const s = Math.sin(dLat/2)**2 + Math.cos(toRad(a[1]))*Math.cos(toRad(b[1]))*Math.sin(dLng/2)**2;
  return 2 * R * Math.asin(Math.sqrt(s));
}

// Quadratic Bezier with perpendicular control-point offset.
// k controls arc height (0 = straight line).
function bezierPath(from, to, k, steps = 100) {
  const midX = (from[0] + to[0]) / 2;
  const midY = (from[1] + to[1]) / 2;
  const dx = to[0] - from[0];
  const dy = to[1] - from[1];
  const len = Math.sqrt(dx*dx + dy*dy);
  // perpendicular unit vector
  const px = -dy / (len || 1);
  const py = dx / (len || 1);
  const cx = midX + px * len * k;
  const cy = midY + py * len * k;
  const pts = [];
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const x = (1-t)*(1-t)*from[0] + 2*(1-t)*t*cx + t*t*to[0];
    const y = (1-t)*(1-t)*from[1] + 2*(1-t)*t*cy + t*t*to[1];
    pts.push([x, y]);
  }
  return pts;
}

function clearLayers() {
  for (const id of ["guess-line", "guess-line-glow", "guess-line-base", "guess-endpoints-glow", "guess-endpoints"]) {
    if (map.getLayer(id)) map.removeLayer(id);
  }
  for (const sid of ["guess-line", "guess-endpoints"]) {
    if (map.getSource(sid)) map.removeSource(sid);
  }
  cometMarker?.remove(); cometMarker = null;
  document.querySelectorAll(".spark, .dust, .seed").forEach(s => s.remove());
}

function placeEndpoints(from, to) {
  guessMarker?.remove(); truthMarker?.remove();
  const g = document.createElement("div"); g.className = "marker-wrap";
  const gd = document.createElement("div"); gd.className = "guess-dot"; g.appendChild(gd);
  guessMarker = new maplibregl.Marker({ element: g }).setLngLat(from).addTo(map);
  const t = document.createElement("div"); t.className = "marker-wrap";
  const td = document.createElement("div"); td.className = "truth-dot"; t.appendChild(td);
  truthMarker = new maplibregl.Marker({ element: t }).setLngLat(to).addTo(map);
}

function fitTo(from, to) {
  const bnds = new maplibregl.LngLatBounds(from, from).extend(to);
  map.fitBounds(bnds, { padding: 80, duration: 400 });
}

function spawnRipple(lngLat, color = "#4d7df0", maxScale = 4, duration = 1300, count = 3) {
  for (let i = 0; i < count; i++) {
    const wrap = document.createElement("div"); wrap.className = "marker-wrap";
    const ring = document.createElement("div"); ring.className = "ripple-ring";
    ring.style.borderColor = color;
    ring.style.boxShadow = `0 0 18px ${color}88`;
    ring.style.transform = "translate(-50%,-50%) scale(0.2)";
    ring.style.opacity = "0.95";
    wrap.appendChild(ring);
    const m = new maplibregl.Marker({ element: wrap }).setLngLat(lngLat).addTo(map);
    anime.animate(ring, {
      scale: maxScale, opacity: 0, duration, delay: i * 180,
      ease: "outCubic", onComplete: () => m.remove(),
    });
  }
}

function spawnParticle(lngLat, className, opts = {}) {
  const wrap = document.createElement("div"); wrap.className = "marker-wrap";
  const dot = document.createElement("div"); dot.className = className;
  // small random translate via margin tweak for organic spread
  const jx = (Math.random()-0.5) * (opts.spread ?? 8);
  const jy = (Math.random()-0.5) * (opts.spread ?? 8);
  dot.style.marginLeft = (parseFloat(getComputedStyle(dot).marginLeft) + jx) + "px";
  dot.style.marginTop  = (parseFloat(getComputedStyle(dot).marginTop)  + jy) + "px";
  wrap.appendChild(dot);
  const m = new maplibregl.Marker({ element: wrap }).setLngLat(lngLat).addTo(map);
  anime.animate(dot, {
    opacity: [opts.opacity ?? 0.9, 0],
    scale: [opts.scaleFrom ?? 1, opts.scaleTo ?? 0.3],
    duration: opts.duration ?? 700,
    ease: opts.ease ?? "outQuad",
    onComplete: () => m.remove(),
  });
}
const spawnSpark = (ll) => spawnParticle(ll, "spark");
const spawnDust  = (ll) => spawnParticle(ll, "dust", { spread: 14, scaleFrom: 0.6, scaleTo: 1.8, duration: 1200, opacity: 0.8 });
const spawnSeed  = (ll) => spawnParticle(ll, "seed", { spread: 30, scaleFrom: 1, scaleTo: 0.6, duration: 900 });

function spawnMagenDavid(lngLat, color = "#4d7df0", maxScale = 3.2, duration = 1400, rotateDeg = 30) {
  const wrap = document.createElement("div"); wrap.className = "marker-wrap";
  const svgNS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(svgNS, "svg");
  svg.setAttribute("class", "magen");
  svg.setAttribute("viewBox", "-50 -50 100 100");
  // two overlaid triangles forming hexagram
  const tri1 = document.createElementNS(svgNS, "polygon");
  tri1.setAttribute("points", "0,-40 34.6,20 -34.6,20");
  const tri2 = document.createElementNS(svgNS, "polygon");
  tri2.setAttribute("points", "0,40 34.6,-20 -34.6,-20");
  for (const t of [tri1, tri2]) {
    t.setAttribute("fill", "none");
    t.setAttribute("stroke", color);
    t.setAttribute("stroke-width", "3");
    t.setAttribute("stroke-linejoin", "round");
    t.style.filter = `drop-shadow(0 0 6px ${color})`;
    svg.appendChild(t);
  }
  wrap.appendChild(svg);
  const m = new maplibregl.Marker({ element: wrap }).setLngLat(lngLat).addTo(map);
  anime.animate(svg, {
    scale: [0.2, maxScale],
    rotate: [0, rotateDeg],
    opacity: [1, 0],
    duration, ease: "outCubic",
    onComplete: () => m.remove(),
  });
}

// ─── Variants ───────────────────────────────────────────────────────────────
const VARIANTS = {
  "current": {
    name: "Current (straight dashed)",
    desc: "What ships today: straight line, dashed, comet head.",
    run: async (from, to, durationMs) => {
      map.addSource("guess-line", { type: "geojson", lineMetrics: true,
        data: { type: "Feature", geometry: { type: "LineString", coordinates: [from, from] } } });
      map.addLayer({ id: "guess-line-glow", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#4d7df0", "line-width": 11, "line-opacity": 0.45, "line-blur": 4 }});
      map.addLayer({ id: "guess-line", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#ffffff", "line-width": 3, "line-dasharray": [1.5, 1.8], "line-opacity": 0.95 }});
      const wrap = document.createElement("div"); wrap.className = "marker-wrap";
      const head = document.createElement("div"); head.className = "comet-head"; wrap.appendChild(head);
      cometMarker = new maplibregl.Marker({ element: wrap }).setLngLat(from).addTo(map);
      const src = map.getSource("guess-line");
      const obj = { t: 0 };
      return new Promise(resolve => {
        anime.animate(obj, {
          t: 1, duration: durationMs, ease: "inOutQuint",
          onUpdate: () => {
            const k = obj.t;
            const lng = from[0] + (to[0]-from[0])*k;
            const lat = from[1] + (to[1]-from[1])*k;
            src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: [from, [lng, lat]] } });
            cometMarker.setLngLat([lng, lat]);
          },
          onComplete: resolve,
        });
      });
    },
  },

  "arc-gradient": {
    name: "Arc + fading comet trail",
    desc: "Bezier arc, line-gradient tail that fades from bright head to transparent, ease-out impact, ripple.",
    run: async (from, to, durationMs, opts = {}) => {
      const k = opts.arcK ?? 0.18;
      const fullPath = bezierPath(from, to, k, 120);

      map.addSource("guess-line", { type: "geojson", lineMetrics: true,
        data: { type: "Feature", geometry: { type: "LineString", coordinates: [from, from] } } });
      map.addLayer({ id: "guess-line-glow", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: {
          "line-width": 12, "line-blur": 6, "line-opacity": 0.55,
          "line-gradient": [ "interpolate", ["linear"], ["line-progress"],
            0.0, "rgba(77,125,240,0)",
            0.7, "rgba(77,125,240,0.4)",
            1.0, "rgba(207,224,255,1)"
          ],
        }});
      map.addLayer({ id: "guess-line", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: {
          "line-width": 3,
          "line-gradient": [ "interpolate", ["linear"], ["line-progress"],
            0.0, "rgba(255,255,255,0)",
            0.5, "rgba(255,255,255,0.4)",
            0.85, "rgba(255,255,255,0.95)",
            1.0, "#ffffff"
          ],
        }});

      const wrap = document.createElement("div"); wrap.className = "marker-wrap";
      const head = document.createElement("div"); head.className = "comet-head"; wrap.appendChild(head);
      cometMarker = new maplibregl.Marker({ element: wrap }).setLngLat(from).addTo(map);
      anime.animate(head, { scale: 1.25, duration: 480, ease: "inOutSine", loop: true, alternate: true });

      const src = map.getSource("guess-line");
      const obj = { t: 0 };
      let lastSpark = 0;
      return new Promise(resolve => {
        anime.animate(obj, {
          t: 1, duration: durationMs,
          // ease that accelerates, then settles into impact
          ease: "cubicBezier(.22,.61,.36,1)",
          onUpdate: () => {
            const idx = Math.max(1, Math.floor(obj.t * (fullPath.length - 1)));
            const slice = fullPath.slice(0, idx + 1);
            src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: slice } });
            const head = slice[slice.length - 1];
            cometMarker.setLngLat(head);
            // sparks every ~80ms during fastest section
            const now = performance.now();
            if (now - lastSpark > 70 && obj.t > 0.05 && obj.t < 0.92) {
              spawnSpark(head); lastSpark = now;
            }
          },
          onComplete: () => {
            // impact: head burst + ripple at truth
            anime.animate(head, { scale: 2.6, opacity: 0, duration: 420, ease: "outQuad",
              onComplete: () => { cometMarker?.remove(); cometMarker = null; }});
            spawnRipple(to, "#4d7df0", 4.5, 1300, 3);
            resolve();
          },
        });
      });
    },
  },

  "ant-path": {
    name: "Ant path (marching dashes)",
    desc: "Arc reveal + dashes that march along the line. Classic GeoGuessr-ish.",
    run: async (from, to, durationMs, opts = {}) => {
      const k = opts.arcK ?? 0.18;
      const fullPath = bezierPath(from, to, k, 120);

      map.addSource("guess-line", { type: "geojson", lineMetrics: true,
        data: { type: "Feature", geometry: { type: "LineString", coordinates: [from, from] } } });
      map.addLayer({ id: "guess-line-glow", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#4d7df0", "line-width": 11, "line-opacity": 0.4, "line-blur": 5 }});
      map.addLayer({ id: "guess-line-base", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#cfe0ff", "line-width": 2.5, "line-opacity": 0.7 }});
      map.addLayer({ id: "guess-line", type: "line", source: "guess-line",
        layout: { "line-cap": "butt", "line-join": "round" },
        paint: { "line-color": "#ffffff", "line-width": 3.5, "line-dasharray": [0.4, 2.2] }});

      // build dash sequence
      const dash = 0.4, gap = 2.2, precision = 1/60;
      const dashSeq = [];
      for (let i = 0; i <= dash; i += precision) dashSeq.push([i, gap, dash - i, 0]);
      for (let i = 0; i < gap; i += precision) dashSeq.push([0, i, dash, gap - i]);
      let dashStep = 0;
      let antRaf = null;
      const tickDash = () => {
        dashStep = (dashStep + 1) % dashSeq.length;
        map.setPaintProperty("guess-line", "line-dasharray", dashSeq[dashStep]);
        antRaf = requestAnimationFrame(tickDash);
      };
      antRaf = requestAnimationFrame(tickDash);

      const wrap = document.createElement("div"); wrap.className = "marker-wrap";
      const head = document.createElement("div"); head.className = "comet-head"; wrap.appendChild(head);
      cometMarker = new maplibregl.Marker({ element: wrap }).setLngLat(from).addTo(map);

      const src = map.getSource("guess-line");
      const obj = { t: 0 };
      return new Promise(resolve => {
        anime.animate(obj, {
          t: 1, duration: durationMs, ease: "inOutQuint",
          onUpdate: () => {
            const idx = Math.max(1, Math.floor(obj.t * (fullPath.length - 1)));
            const slice = fullPath.slice(0, idx + 1);
            src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: slice } });
            cometMarker.setLngLat(slice[slice.length - 1]);
          },
          onComplete: () => {
            cancelAnimationFrame(antRaf);
            anime.animate(head, { scale: 2.4, opacity: 0, duration: 380, ease: "outQuad",
              onComplete: () => { cometMarker?.remove(); cometMarker = null; }});
            spawnRipple(to, "#cfe0ff", 4, 1200, 2);
            resolve();
          },
        });
      });
    },
  },

  "magen-david": {
    name: "🇮🇱 Magen David burst",
    desc: "Flag-blue arc, white core, impact spawns a Star of David that scales out and fades.",
    run: async (from, to, durationMs, opts = {}) => {
      const k = opts.arcK ?? 0.18;
      const fullPath = bezierPath(from, to, k, 120);
      map.addSource("guess-line", { type: "geojson", lineMetrics: true,
        data: { type: "Feature", geometry: { type: "LineString", coordinates: [from, from] } } });
      map.addLayer({ id: "guess-line-glow", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: {
          "line-width": 12, "line-blur": 6, "line-opacity": 0.55,
          "line-gradient": [ "interpolate", ["linear"], ["line-progress"],
            0.0, "rgba(0,56,184,0)",
            0.7, "rgba(0,56,184,0.55)",
            1.0, "rgba(255,255,255,1)"
          ],
        }});
      map.addLayer({ id: "guess-line", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: {
          "line-width": 3,
          "line-gradient": [ "interpolate", ["linear"], ["line-progress"],
            0.0, "rgba(255,255,255,0)",
            0.6, "rgba(220,232,255,0.7)",
            1.0, "#ffffff"
          ],
        }});

      const wrap = document.createElement("div"); wrap.className = "marker-wrap";
      const head = document.createElement("div"); head.className = "comet-head";
      head.style.background = "radial-gradient(circle, #fff 0%, #cfe0ff 45%, #0038b8 90%, rgba(0,56,184,0) 100%)";
      head.style.boxShadow = "0 0 24px 7px rgba(0,56,184,0.9), 0 0 44px 12px rgba(255,255,255,0.4)";
      wrap.appendChild(head);

  "hatikvah": {
    name: "🎗 Hatikvah ribbon",
    desc: "Alternating blue/white ribbon stripe (flag colors) sweeping along the arc, marching forward.",
    run: async (from, to, durationMs, opts = {}) => {
      const k = opts.arcK ?? 0.16;
      const fullPath = bezierPath(from, to, k, 120);

      map.addSource("guess-line", { type: "geojson", lineMetrics: true,
        data: { type: "Feature", geometry: { type: "LineString", coordinates: [from, from] } } });
      // outer white "tallit" wrap glow
      map.addLayer({ id: "guess-line-glow", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#ffffff", "line-width": 9, "line-opacity": 0.4, "line-blur": 4 }});
      // base white ribbon
      map.addLayer({ id: "guess-line-base", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: { "line-color": "#ffffff", "line-width": 5, "line-opacity": 0.95 }});
      // blue marching dashes overlaid (flag blue #0038b8)
      map.addLayer({ id: "guess-line", type: "line", source: "guess-line",
        layout: { "line-cap": "butt", "line-join": "round" },
        paint: { "line-color": "#0038b8", "line-width": 5, "line-dasharray": [0.6, 1.8] }});

      // dash marching loop
      const dash = 0.6, gap = 1.8, precision = 1/40;
      const dashSeq = [];
      for (let i = 0; i <= dash; i += precision) dashSeq.push([i, gap, dash - i, 0]);
      for (let i = 0; i < gap; i += precision) dashSeq.push([0, i, dash, gap - i]);
      let dashStep = 0, antRaf = null;
      const tick = () => {
        dashStep = (dashStep + 1) % dashSeq.length;
        if (map.getLayer("guess-line")) map.setPaintProperty("guess-line", "line-dasharray", dashSeq[dashStep]);
        antRaf = requestAnimationFrame(tick);
      };
      antRaf = requestAnimationFrame(tick);

      const wrap = document.createElement("div"); wrap.className = "marker-wrap";
      const head = document.createElement("div"); head.className = "comet-head";
      head.style.background = "radial-gradient(circle, #fff 0%, #cfe0ff 50%, #0038b8 100%)";
      head.style.boxShadow = "0 0 22px 6px rgba(0,56,184,0.85), 0 0 40px 10px rgba(255,255,255,0.45)";
      wrap.appendChild(head);
      cometMarker = new maplibregl.Marker({ element: wrap }).setLngLat(from).addTo(map);

      const src = map.getSource("guess-line");
      const obj = { t: 0 };
      return new Promise(resolve => {
        anime.animate(obj, {
          t: 1, duration: durationMs, ease: "inOutQuint",
          onUpdate: () => {
            const idx = Math.max(1, Math.floor(obj.t * (fullPath.length - 1)));
            const slice = fullPath.slice(0, idx + 1);
            src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: slice } });
            cometMarker.setLngLat(slice[slice.length - 1]);
          },
          onComplete: () => {
            cancelAnimationFrame(antRaf);
            anime.animate(head, { scale: 2.6, opacity: 0, duration: 400, ease: "outQuad",
              onComplete: () => { cometMarker?.remove(); cometMarker = null; }});
            spawnRipple(to, "#0038b8", 4, 1200, 2);
            spawnRipple(to, "#ffffff", 3.2, 1100, 1);
            resolve();
          },
        });
      });
    },
  },

  "magen-hatikvah": {
    name: "🇮🇱 Magen + Hatikvah (locked)",
    desc: "Flag-color ribbon + Magen David impact. Endpoints rendered as WebGL circles in the same source as the line — zero drift between dots and arc.",
    run: async (from, to, durationMs, opts = {}) => {
      const k = opts.arcK ?? 0.16;
      const fullPath = bezierPath(from, to, k, 140);
      // force EXACT endpoint coords (bezier math gives this already, but be paranoid about FP)
      fullPath[0] = [from[0], from[1]];
      fullPath[fullPath.length - 1] = [to[0], to[1]];

      // ── Endpoints + line live in WebGL so they project identically ────────
      // Endpoints source: FeatureCollection of 2 Points (guess + truth)
      map.addSource("guess-endpoints", { type: "geojson", data: {
        type: "FeatureCollection", features: [
          { type: "Feature", properties: { role: "guess" }, geometry: { type: "Point", coordinates: from }},
          { type: "Feature", properties: { role: "truth" }, geometry: { type: "Point", coordinates: to }},
        ]}});

      // Line source — animated
      map.addSource("guess-line", { type: "geojson", lineMetrics: true,
        data: { type: "Feature", geometry: { type: "LineString", coordinates: [from, from] } } });

      // Outer white tallit glow
      map.addLayer({ id: "guess-line-glow", type: "line", source: "guess-line",
        layout: { "line-cap": "butt", "line-join": "round" },
        paint: { "line-color": "#ffffff", "line-width": 10, "line-opacity": 0.45, "line-blur": 5 }});

      // Base white ribbon (full-line gradient so it reveals progressively)
      map.addLayer({ id: "guess-line-base", type: "line", source: "guess-line",
        layout: { "line-cap": "butt", "line-join": "round" },
        paint: {
          "line-width": 5,
          "line-gradient": [ "interpolate", ["linear"], ["line-progress"],
            0.0, "rgba(255,255,255,0.7)",
            0.85, "rgba(255,255,255,0.95)",
            1.0, "#ffffff"
          ],
        }});

      // Blue marching dashes overlaid (flag blue)
      map.addLayer({ id: "guess-line", type: "line", source: "guess-line",
        layout: { "line-cap": "butt", "line-join": "round" },
        paint: { "line-color": "#0038b8", "line-width": 5, "line-dasharray": [0.55, 1.8], "line-opacity": 0.95 }});

      // Endpoint circles — rendered AFTER the line so they sit on top.
      // These are the "anchors" — guarantees the line visually meets them.
      map.addLayer({ id: "guess-endpoints-glow", type: "circle", source: "guess-endpoints",
        paint: {
          "circle-radius": 14,
          "circle-color": ["match", ["get", "role"], "guess", "#0038b8", "#ffffff"],
          "circle-blur": 1.2,
          "circle-opacity": 0.55,
        }});
      map.addLayer({ id: "guess-endpoints", type: "circle", source: "guess-endpoints",
        paint: {
          "circle-radius": 7,
          "circle-color": ["match", ["get", "role"], "guess", "#0038b8", "#ffffff"],
          "circle-stroke-color": "#ffffff",
          "circle-stroke-width": 2.5,
        }});

      // Dash marching loop
      const dash = 0.55, gap = 1.8, precision = 1/40;
      const dashSeq = [];
      for (let i = 0; i <= dash; i += precision) dashSeq.push([i, gap, dash - i, 0]);
      for (let i = 0; i < gap; i += precision) dashSeq.push([0, i, dash, gap - i]);
      let dashStep = 0, antRaf = null;
      const tick = () => {
        dashStep = (dashStep + 1) % dashSeq.length;
        if (map.getLayer("guess-line")) map.setPaintProperty("guess-line", "line-dasharray", dashSeq[dashStep]);
        antRaf = requestAnimationFrame(tick);
      };
      antRaf = requestAnimationFrame(tick);

      // Comet head (HTML overlay) — snaps to exact bezier endpoint always
      const wrap = document.createElement("div"); wrap.className = "marker-wrap";
      const head = document.createElement("div"); head.className = "comet-head";
      head.style.background = "radial-gradient(circle, #ffffff 0%, #cfe0ff 50%, #0038b8 100%)";
      head.style.boxShadow = "0 0 22px 7px rgba(0,56,184,0.9), 0 0 44px 12px rgba(255,255,255,0.45)";
      wrap.appendChild(head);
      cometMarker = new maplibregl.Marker({ element: wrap, anchor: "center" }).setLngLat(from).addTo(map);
      const pulse = anime.animate(head, { scale: 1.2, duration: 460, ease: "inOutSine", loop: true, alternate: true });

      const src = map.getSource("guess-line");
      const obj = { t: 0 };
      return new Promise(resolve => {
        anime.animate(obj, {
          t: 1, duration: durationMs, ease: "cubicBezier(.22,.61,.36,1)",
          onUpdate: () => {
            // Math.round ensures we land on the exact last index at t=1 instead of one short.
            const last = fullPath.length - 1;
            let idx = Math.round(obj.t * last);
            if (idx < 1) idx = 1;
            const slice = fullPath.slice(0, idx + 1);
            // Force exact endpoint at completion to kill any FP residue.
            if (idx === last) slice[slice.length - 1] = [to[0], to[1]];
            src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: slice } });
            cometMarker.setLngLat(slice[slice.length - 1]);
          },
          onComplete: () => {
            // Pin to truth exactly, then burst.
            src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: fullPath } });
            cometMarker.setLngLat(to);
            pulse.pause?.();
            cancelAnimationFrame(antRaf);
            anime.animate(head, { scale: 2.8, opacity: 0, duration: 420, ease: "outQuad",
              onComplete: () => { cometMarker?.remove(); cometMarker = null; }});
            // 4 staggered hexagram bursts — each a bit bigger, alternating blue/white,
            // counter-rotating for a layered "blooming" effect.
            const bursts = [
              { color: "#0038b8", scale: 2.4, dur: 1100, delay: 0 },
              { color: "#ffffff", scale: 3.0, dur: 1250, delay: 120 },
              { color: "#0038b8", scale: 3.6, dur: 1400, delay: 260 },
              { color: "#ffffff", scale: 4.3, dur: 1550, delay: 420 },
            ];
            bursts.forEach((b, i) => setTimeout(
              () => spawnMagenDavid(to, b.color, b.scale, b.dur, i % 2 === 0 ? 30 : -30),
              b.delay,
            ));
            spawnRipple(to, "#ffffff", 3.0, 1100, 1);
            spawnRipple(to, "#0038b8", 4.2, 1300, 2);
            resolve();
          },
        });
      });
    },
  },

  "shoot-arrive": {
    name: "Shoot-and-arrive",
    desc: "Fast accelerating shot along arc, snap-in to truth marker with hard impact ripple + screen flash.",
    run: async (from, to, durationMs, opts = {}) => {
      const k = opts.arcK ?? 0.22;
      const fullPath = bezierPath(from, to, k, 140);

      map.addSource("guess-line", { type: "geojson", lineMetrics: true,
        data: { type: "Feature", geometry: { type: "LineString", coordinates: [from, from] } } });
      map.addLayer({ id: "guess-line-glow", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: {
          "line-width": 14, "line-blur": 7,
          "line-gradient": [ "interpolate", ["linear"], ["line-progress"],
            0.0, "rgba(240,164,77,0)",
            0.6, "rgba(240,164,77,0.45)",
            1.0, "rgba(255,255,255,0.9)"
          ],
        }});
      map.addLayer({ id: "guess-line", type: "line", source: "guess-line",
        layout: { "line-cap": "round", "line-join": "round" },
        paint: {
          "line-width": ["interpolate", ["linear"], ["line-progress"], 0, 0.5, 1, 4],
          "line-gradient": [ "interpolate", ["linear"], ["line-progress"],
            0.0, "rgba(255,255,255,0)",
            0.7, "rgba(255,220,180,0.85)",
            1.0, "#ffffff"
          ],
        }});

      const wrap = document.createElement("div"); wrap.className = "marker-wrap";
      const head = document.createElement("div"); head.className = "comet-head";
      head.style.background = "radial-gradient(circle, #fff 0%, #ffe4bf 40%, #f0a44d 80%, rgba(240,164,77,0) 100%)";
      head.style.boxShadow = "0 0 26px 8px rgba(240,164,77,0.9), 0 0 50px 14px rgba(255,255,255,0.4)";
      wrap.appendChild(head);
      cometMarker = new maplibregl.Marker({ element: wrap }).setLngLat(from).addTo(map);

      const src = map.getSource("guess-line");
      const obj = { t: 0 };
      let lastSpark = 0;
      return new Promise(resolve => {
        anime.animate(obj, {
          t: 1, duration: durationMs,
          // strong ease-out: rocket leaves fast, decelerates into target
          ease: "cubicBezier(.12,.65,.2,1)",
          onUpdate: () => {
            const idx = Math.max(1, Math.floor(obj.t * (fullPath.length - 1)));
            const slice = fullPath.slice(0, idx + 1);
            src.setData({ type: "Feature", geometry: { type: "LineString", coordinates: slice } });
            const h = slice[slice.length - 1];
            cometMarker.setLngLat(h);
            const now = performance.now();
            if (now - lastSpark > 50 && obj.t < 0.95) { spawnSpark(h); lastSpark = now; }
          },
          onComplete: () => {
            anime.animate(head, { scale: 3.2, opacity: 0, duration: 480, ease: "outQuad",
              onComplete: () => { cometMarker?.remove(); cometMarker = null; }});
            spawnRipple(to, "#f0a44d", 5, 1500, 4);
            resolve();
          },
        });
      });
    },
  },
};

// ─── UI wiring ──────────────────────────────────────────────────────────────
const varContainer = document.getElementById("variants");
for (const key of Object.keys(VARIANTS)) {
  const div = document.createElement("div");
  div.className = "variant" + (key === activeVariant ? " active" : "");
  div.dataset.key = key;
  div.innerHTML = `<div class="name">${VARIANTS[key].name}</div><div class="desc">${VARIANTS[key].desc}</div>`;
  div.onclick = () => {
    activeVariant = key;
    document.querySelectorAll(".variant").forEach(v => v.classList.toggle("active", v.dataset.key === key));
    document.getElementById("varName").textContent = VARIANTS[key].name;
    setupScene();
  };
  varContainer.appendChild(div);
}

document.querySelectorAll(".preset").forEach(btn => {
  btn.onclick = () => {
    activePreset = +btn.dataset.preset;
    document.querySelectorAll(".preset").forEach(b => b.classList.toggle("active", b === btn));
    setupScene();
  };
});

const durSlider = document.getElementById("duration");
const arcSlider = document.getElementById("arcK");
durSlider.oninput = () => document.getElementById("durVal").textContent = durSlider.value + "ms";
arcSlider.oninput = () => document.getElementById("arcKVal").textContent = arcSlider.value;

function setupScene() {
  if (playing) return;
  clearLayers();
  const { from, to } = PRESETS[activePreset];
  // For setup preview, always show HTML endpoint dots so you can see where they are.
  placeEndpoints(from, to);
  fitTo(from, to);
  document.getElementById("dist").textContent = haversine(from, to).toFixed(1) + " km";
  document.getElementById("varName").textContent = VARIANTS[activeVariant].name;
}

document.getElementById("play").onclick = async () => {
  if (playing) return;
  playing = true;
  const btn = document.getElementById("play");
  btn.disabled = true; btn.textContent = "Playing…";
  clearLayers();
  const { from, to } = PRESETS[activePreset];
  // Variants that render their own WebGL endpoint circles should NOT also have
  // HTML markers floating above — that would be two visuals at one coord.
  const VARIANTS_WITH_OWN_ENDPOINTS = new Set(["magen-hatikvah"]);
  if (VARIANTS_WITH_OWN_ENDPOINTS.has(activeVariant)) {
    guessMarker?.remove(); truthMarker?.remove();
    guessMarker = truthMarker = null;
  } else {
    placeEndpoints(from, to);
  }
  await VARIANTS[activeVariant].run(from, to, +durSlider.value, { arcK: +arcSlider.value });
  playing = false;
  btn.disabled = false; btn.textContent = "▶ Play again";
};

map.on("load", () => { setupScene(); });
</script>
