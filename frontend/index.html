<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>IsraelE — נחשו מקומות בישראל</title>
<meta name="description" content="משחק גיאוגרפיה בסגנון וורדל לישראל. 6 סבבים — כמה קרוב תצליחו ללחוץ?" />
<meta property="og:title" content="IsraelE — נחשו מקומות בישראל" />
<meta property="og:description" content="6 סבבים. ערים, קיבוצים, הרים, חורבות. סמנו על המפה — כמה שיותר קרוב, יותר נקודות." />
<meta property="og:image" content="/docs/homepage.png" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="icon" type="image/png" href="/docs/flag.png" />
<link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
<link href="/static/style.css" rel="stylesheet" />
</head>
<body>
<div id="map"></div>

<div id="hud" class="hidden">
  <div id="round-info">
    <span id="round-num"></span>
    <span id="round-mult"></span>
    <span id="round-score"></span>
  </div>
  <div id="prompt">
    איפה <span id="place-name-he"></span>?
    <div id="place-type"></div>
  </div>
</div>

<div id="overlay">
  <div id="start-card" class="card">
    <img class="flag-icon" src="/docs/flag.png" alt="דגל ישראל" />
    <h1>IsraelE</h1>
    <p>6 סבבים. סמנו על המפה איפה לדעתכם נמצא המקום.</p>
    <div class="mult-legend">
      <div><span class="m1">×1</span> 2 ערים · עד 100 כ״א</div>
      <div><span class="m2">×1.5</span> 2 יישובים · עד 150 כ״א</div>
      <div><span class="m3">×2.5</span> 2 אתרים · עד 250 כ״א</div>
    </div>
    <div class="game-total-hint">כל משחק עד <b>1000</b> נקודות</div>
    <button id="btn-start">התחל</button>
  </div>

  <div id="reveal-card" class="card hidden">
    <h2 id="reveal-score"></h2>
    <div id="reveal-breakdown"></div>
    <div id="reveal-place"></div>
    <div id="reveal-dist"></div>
    <button id="btn-next">הבא ←</button>
  </div>

  <div id="end-card" class="card hidden">
    <h1>סיום משחק</h1>
    <div id="final-score"></div>
    <div id="final-max">מתוך 1000</div>
    <button id="btn-restart">שחק שוב</button>
  </div>
</div>

<script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
